<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Selected workflow systems portfolio map</title>
  <desc id="desc">A deterministic portfolio map connecting five projects to the shared theme of workflow systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c10"/>
      <stop offset="1" stop-color="#15161c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0cc7a"/>
      <stop offset="1" stop-color="#d4a853"/>
    </linearGradient>
    <style>
      .title { font: 700 30px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f4efe6; letter-spacing: 0; }
      .sub { font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.64); letter-spacing: 0; }
      .cardTitle { font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f4efe6; letter-spacing: 0; }
      .cardBody { font: 500 12.5px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.64); letter-spacing: 0; }
      .pill { font: 700 11px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0c0c10; letter-spacing: .08em; text-transform: uppercase; }
    </style>
    <filter id="shadow" x="-18%" y="-20%" width="136%" height="142%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".30"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="518" rx="25" stroke="rgba(255,255,255,.08)"/>

  <text x="64" y="72" class="title">Selected Systems Portfolio</text>
  <text x="66" y="101" class="sub">Different domains, same engineering pattern: turn ambiguous workflows into structured, inspectable software.</text>

  <g opacity=".70" stroke="#d4a853" stroke-width="2">
    <path d="M640 146 V184"/>
    <path d="M640 290 V328"/>
    <path d="M260 238 H545"/>
    <path d="M735 238 H1020"/>
    <path d="M450 238 C498 238 509 361 560 361"/>
    <path d="M830 238 C782 238 771 361 720 361"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="136" width="240" height="92" rx="18" fill="#15161c" stroke="rgba(212,168,83,.45)"/>
    <rect x="550" y="158" width="80" height="22" rx="11" fill="url(#accent)"/>
    <text x="569" y="173" class="pill">Flagship</text>
    <text x="550" y="204" class="cardTitle">RPG_Demo</text>
    <text x="550" y="224" class="cardBody">AI story authoring, play runtime, and review state.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="190" width="244" height="96" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <rect x="116" y="214" width="82" height="22" rx="11" fill="#2d7aa2"/>
    <text x="135" y="229" class="pill" fill="#f4efe6">Advisor</text>
    <text x="116" y="260" class="cardTitle">ScholarPath</text>
    <text x="116" y="280" class="cardBody">Guided intake, retrieval, recommendation surfaces.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="948" y="190" width="244" height="96" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <rect x="976" y="214" width="92" height="22" rx="11" fill="#2d7aa2"/>
    <text x="994" y="229" class="pill" fill="#f4efe6">Workflow</text>
    <text x="976" y="260" class="cardTitle">CalendarDIFF</text>
    <text x="976" y="280" class="cardBody">Change detection, proposals, integrations.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="328" y="324" width="272" height="104" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <rect x="356" y="350" width="98" height="22" rx="11" fill="#2d7aa2"/>
    <text x="373" y="365" class="pill" fill="#f4efe6">Hardware</text>
    <text x="356" y="396" class="cardTitle">auto-load-off-test</text>
    <text x="356" y="416" class="cardBody">SCPI/PyVISA validation workflow and exports.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="680" y="324" width="272" height="104" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <rect x="708" y="350" width="98" height="22" rx="11" fill="#2d7aa2"/>
    <text x="726" y="365" class="pill" fill="#f4efe6">Ops Tool</text>
    <text x="708" y="396" class="cardTitle">mail-to-dingtalk-todo</text>
    <text x="708" y="416" class="cardBody">Email parsing, task handoff, idempotent sync.</text>
  </g>

  <g>
    <rect x="252" y="458" width="776" height="34" rx="17" fill="rgba(212,168,83,.10)" stroke="rgba(212,168,83,.28)"/>
    <text x="286" y="480" class="cardBody">Shared theme: state, contracts, workflow automation, human review, and product-facing proof</text>
  </g>
</svg>
