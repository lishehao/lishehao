<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AI product engineering workflow</title>
  <desc id="desc">A deterministic workflow diagram showing discover, prototype, compile, inspect, and iterate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c10"/>
      <stop offset="1" stop-color="#15161c"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f0cc7a"/>
      <stop offset="1" stop-color="#d4a853"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 34px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f4efe6; letter-spacing: 0; }
      .sub { font: 500 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.66); letter-spacing: 0; }
      .label { font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f4efe6; letter-spacing: 0; }
      .body { font: 500 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.64); letter-spacing: 0; }
      .num { font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: #0c0c10; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1280" height="420" rx="28" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="418" rx="27" stroke="rgba(255,255,255,.08)"/>

  <g opacity=".45">
    <path d="M72 322 C210 260 242 122 410 138 C568 153 595 295 744 281 C880 268 917 133 1088 104" stroke="#2d7aa2" stroke-width="1.2"/>
    <path d="M89 350 C245 286 280 167 440 186 C602 205 612 337 782 319 C955 301 972 174 1190 150" stroke="#d4a853" stroke-width="1.2"/>
  </g>

  <text x="72" y="82" class="title">AI Product Engineering Loop</text>
  <text x="74" y="112" class="sub">Turning ambiguous user intent into inspectable, reliable, product-shaped AI workflows.</text>

  <g filter="url(#softShadow)">
    <rect x="72" y="172" width="230" height="132" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <circle cx="104" cy="204" r="15" fill="url(#amber)"/>
    <text x="99" y="209" class="num">1</text>
    <text x="126" y="200" class="label">Discover</text>
    <text x="100" y="238" class="body">User problem</text>
    <text x="100" y="260" class="body">Workflow pain</text>
    <text x="100" y="282" class="body">What should improve</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="358" y="172" width="230" height="132" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <circle cx="390" cy="204" r="15" fill="url(#amber)"/>
    <text x="385" y="209" class="num">2</text>
    <text x="412" y="200" class="label">Prototype</text>
    <text x="386" y="238" class="body">Clickable UI</text>
    <text x="386" y="260" class="body">API boundary</text>
    <text x="386" y="282" class="body">End-to-end demo</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="644" y="172" width="230" height="132" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <circle cx="676" cy="204" r="15" fill="url(#amber)"/>
    <text x="671" y="209" class="num">3</text>
    <text x="698" y="200" class="label">Compile</text>
    <text x="672" y="238" class="body">Typed contracts</text>
    <text x="672" y="260" class="body">Runtime state</text>
    <text x="672" y="282" class="body">LLM permissions</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="930" y="172" width="278" height="132" rx="18" fill="#15161c" stroke="rgba(255,255,255,.12)"/>
    <circle cx="962" cy="204" r="15" fill="url(#amber)"/>
    <text x="957" y="209" class="num">4</text>
    <text x="984" y="200" class="label">Inspect and Iterate</text>
    <text x="958" y="238" class="body">Reviewer surface</text>
    <text x="958" y="260" class="body">Eval and bad-case loop</text>
    <text x="958" y="282" class="body">Recovery, replay, and trust</text>
  </g>

  <g stroke="#d4a853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M314 238 H344"/>
    <path d="M336 230 L344 238 L336 246"/>
    <path d="M600 238 H630"/>
    <path d="M622 230 L630 238 L622 246"/>
    <path d="M886 238 H916"/>
    <path d="M908 230 L916 238 L908 246"/>
  </g>

  <g opacity=".92">
    <rect x="72" y="340" width="1136" height="38" rx="19" fill="rgba(212,168,83,.10)" stroke="rgba(212,168,83,.28)"/>
    <text x="102" y="365" class="body">Product judgment + full-stack implementation + inspectable AI workflow design</text>
  </g>
</svg>
