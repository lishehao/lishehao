<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Tiny Stories architecture workflow</title>
  <desc id="desc">Architecture diagram from seed to preview, author job, library, play session, and ending artifact.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0c0c10"/>
      <stop offset="1" stop-color="#14151b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#efc873"/>
      <stop offset="1" stop-color="#d4a853"/>
    </linearGradient>
    <style>
      .title { font: 700 31px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f4efe6; letter-spacing: 0; }
      .sub { font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.64); letter-spacing: 0; }
      .nodeTitle { font: 700 18px Inter, ui-sans-serif, system-ui, sans-serif; fill: #f4efe6; letter-spacing: 0; }
      .nodeBody { font: 500 12.5px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.66); letter-spacing: 0; }
      .lane { font: 700 13px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.56); letter-spacing: .08em; text-transform: uppercase; }
      .small { font: 600 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: rgba(244,239,230,.70); letter-spacing: 0; }
    </style>
    <filter id="shadow" x="-16%" y="-24%" width="132%" height="148%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000" flood-opacity=".32"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="26" fill="url(#bg)"/>
  <rect x="1" y="1" width="1278" height="638" rx="25" stroke="rgba(255,255,255,.08)"/>

  <text x="64" y="74" class="title">Tiny Stories: From Seed to Inspectable Play</text>
  <text x="66" y="103" class="sub">A product loop for AI-generated interactive stories, with explicit state and review surfaces.</text>

  <g opacity=".45" stroke="rgba(255,255,255,.10)">
    <path d="M64 151 H1216"/>
    <path d="M64 289 H1216"/>
    <path d="M64 428 H1216"/>
    <path d="M64 566 H1216"/>
  </g>
  <text x="72" y="143" class="lane">User Surface</text>
  <text x="72" y="281" class="lane">Backend Runtime</text>
  <text x="72" y="420" class="lane">LLM Boundary</text>
  <text x="72" y="558" class="lane">Persistence and Review</text>

  <g stroke="#d4a853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 220 H332"/>
    <path d="M324 212 L332 220 L324 228"/>
    <path d="M474 220 H546"/>
    <path d="M538 212 L546 220 L538 228"/>
    <path d="M688 220 H760"/>
    <path d="M752 212 L760 220 L752 228"/>
    <path d="M902 220 H974"/>
    <path d="M966 212 L974 220 L966 228"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="88" y="174" width="172" height="92" rx="15" fill="#15161c" stroke="rgba(255,255,255,.13)"/>
    <text x="112" y="208" class="nodeTitle">Seed</text>
    <text x="112" y="235" class="nodeBody">One story opening</text>
    <rect x="112" y="246" width="82" height="4" rx="2" fill="url(#accent)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="332" y="174" width="142" height="92" rx="15" fill="#15161c" stroke="rgba(255,255,255,.13)"/>
    <text x="356" y="208" class="nodeTitle">Preview</text>
    <text x="356" y="235" class="nodeBody">AI interpretation</text>
    <text x="356" y="253" class="nodeBody">user confirms</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="546" y="174" width="142" height="92" rx="15" fill="#15161c" stroke="rgba(255,255,255,.13)"/>
    <text x="570" y="208" class="nodeTitle">Author Job</text>
    <text x="570" y="235" class="nodeBody">story frame</text>
    <text x="570" y="253" class="nodeBody">cast and beats</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="760" y="174" width="142" height="92" rx="15" fill="#15161c" stroke="rgba(255,255,255,.13)"/>
    <text x="784" y="208" class="nodeTitle">Library</text>
    <text x="784" y="235" class="nodeBody">published world</text>
    <text x="784" y="253" class="nodeBody">shareable entry</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="974" y="174" width="218" height="92" rx="15" fill="#15161c" stroke="rgba(255,255,255,.13)"/>
    <text x="998" y="208" class="nodeTitle">Play Session</text>
    <text x="998" y="235" class="nodeBody">natural-language turns</text>
    <text x="998" y="253" class="nodeBody">stateful consequence loop</text>
  </g>

  <g stroke="rgba(45,122,162,.8)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M617 266 V318"/>
    <path d="M609 310 L617 318 L625 310"/>
    <path d="M1083 266 V318"/>
    <path d="M1075 310 L1083 318 L1091 310"/>
  </g>

  <g>
    <rect x="462" y="322" width="312" height="66" rx="15" fill="#111218" stroke="rgba(45,122,162,.55)"/>
    <text x="486" y="349" class="small">FastAPI + Pydantic contracts</text>
    <text x="486" y="371" class="nodeBody">route map, typed requests, product adapters</text>
  </g>
  <g>
    <rect x="928" y="322" width="312" height="66" rx="15" fill="#111218" stroke="rgba(45,122,162,.55)"/>
    <text x="952" y="349" class="small">Play runtime</text>
    <text x="952" y="371" class="nodeBody">choice resolution, advisor, transcript, ending judge</text>
  </g>

  <g stroke="rgba(212,168,83,.72)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M617 388 V457"/>
    <path d="M609 449 L617 457 L625 449"/>
    <path d="M1083 388 V457"/>
    <path d="M1075 449 L1083 457 L1091 449"/>
  </g>

  <g>
    <rect x="304" y="461" width="194" height="66" rx="15" fill="rgba(212,168,83,.08)" stroke="rgba(212,168,83,.42)"/>
    <text x="328" y="488" class="small">Structured generation</text>
    <text x="328" y="510" class="nodeBody">scaffold before model output</text>
  </g>
  <g>
    <rect x="540" y="461" width="194" height="66" rx="15" fill="rgba(212,168,83,.08)" stroke="rgba(212,168,83,.42)"/>
    <text x="564" y="488" class="small">Bounded authority</text>
    <text x="564" y="510" class="nodeBody">advisor cannot mutate state</text>
  </g>
  <g>
    <rect x="776" y="461" width="194" height="66" rx="15" fill="rgba(212,168,83,.08)" stroke="rgba(212,168,83,.42)"/>
    <text x="800" y="488" class="small">Runtime state</text>
    <text x="800" y="510" class="nodeBody">inventory, trust, pressure</text>
  </g>
  <g>
    <rect x="1012" y="461" width="194" height="66" rx="15" fill="rgba(212,168,83,.08)" stroke="rgba(212,168,83,.42)"/>
    <text x="1036" y="488" class="small">Ending artifact</text>
    <text x="1036" y="510" class="nodeBody">compiled from actual play</text>
  </g>

  <g>
    <rect x="164" y="574" width="952" height="38" rx="19" fill="rgba(255,255,255,.035)" stroke="rgba(255,255,255,.10)"/>
    <text x="194" y="599" class="nodeBody">SQLite persistence, checkpoints, transcript, reviewer mode, restart-safe sessions, and inspectable artifacts</text>
  </g>
</svg>
